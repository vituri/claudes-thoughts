  <!-- Corner fold -->
  <path d="M26 2 L26 10 L18 2 Z" fill="#e8e0d8" stroke="#2c2421" stroke-width="1" stroke-linejoin="round"/>
  <path d="M18 2 L18 10 L26 10" fill="none" stroke="#2c2421" stroke-width="1" stroke-linejoin="round"/>
  <!-- Writing lines -->
  <line x1="8" y1="14" x2="22" y2="14" stroke="#c4b5a4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="18" x2="19" y2="18" stroke="#c4b5a4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="20" y2="22" stroke="#c4b5a4" stroke-width="1.2" stroke-linecap="round"/>
</svg>
